<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Đăng nhập — Vàng Tích Trữ</title>
<link rel="apple-touch-icon" href="assets/icon.png">
<link rel="icon" href="assets/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/secure-config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9922A;
    --gold-light: #F5E6C8;
    --gold-dark: #8B6014;
    --bg: #0F0E0A;
    --bg2: #1A1810;
    --bg3: #242218;
    --text: #F5F0E8;
    --text2: #B8AE98;
    --text3: #7A7060;
    --border: rgba(201,146,42,0.2);
    --red: #E24B4A;
    --font-display: 'Playfair Display', serif;
    --font-label: 'Josefin Sans', sans-serif;
  }

  body {
    font-family: var(--font-label);
    background: #0F0E0A;
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(20px, env(safe-area-inset-top, 20px)) max(20px, env(safe-area-inset-right, 20px)) max(20px, env(safe-area-inset-bottom, 20px)) max(20px, env(safe-area-inset-left, 20px));
    -webkit-font-smoothing: antialiased;
    overflow-y: auto;
  }

  /* ── Canvas background ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    display: block;
  }

  /* ── Vignette ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse 75% 75% at 50% 50%,
      transparent 20%, rgba(15,14,10,0.5) 65%, rgba(15,14,10,0.9) 100%);
  }

  /* ── Aurora sweeps ── */
  .aurora { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }

  .aurora-beam {
    position: absolute;
    width: 220%; height: 280px;
    top: 50%; left: -60%;
    background: linear-gradient(180deg,
      transparent 0%, rgba(201,146,42,0.022) 35%,
      rgba(245,225,180,0.042) 50%, rgba(201,146,42,0.022) 65%, transparent 100%);
    filter: blur(28px);
    animation: sweep1 16s ease-in-out infinite alternate;
    transform: translateY(-50%) rotate(-16deg);
  }
  .aurora-beam:nth-child(2) {
    top: 22%; height: 160px;
    filter: blur(40px);
    animation: sweep2 21s ease-in-out infinite alternate;
    transform: translateY(-50%) rotate(-10deg);
  }

  @keyframes sweep1 {
    from { transform: translateY(-50%) rotate(-16deg) translateX(-6%); opacity:.7; }
    to   { transform: translateY(-50%) rotate(-16deg) translateX( 6%); opacity:1; }
  }
  @keyframes sweep2 {
    from { transform: translateY(-50%) rotate(-10deg) translateX( 5%); }
    to   { transform: translateY(-50%) rotate(-10deg) translateX(-5%); }
  }

  /* ── Card ── */
  .login-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 400px;
    animation: card-rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes card-rise {
    from { opacity:0; transform: translateY(30px) scale(0.97); }
    to   { opacity:1; transform: translateY(0)    scale(1); }
  }

  .login-card {
    background: linear-gradient(155deg, rgba(28,25,16,0.97), rgba(20,18,12,0.97));
    border: 1px solid rgba(201,146,42,0.22);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    box-shadow:
      0 32px 80px rgba(0,0,0,0.75),
      0 0 0 1px rgba(201,146,42,0.06),
      inset 0 1px 0 rgba(201,146,42,0.13);
    position: relative;
    overflow: hidden;
  }

  /* shimmer streak */
  .login-card::before {
    content: '';
    position: absolute;
    top: -50%; left: -40%;
    width: 55%; height: 200%;
    background: linear-gradient(105deg,
      transparent 38%, rgba(201,146,42,0.035) 48%,
      rgba(245,225,170,0.055) 52%, rgba(201,146,42,0.035) 56%, transparent 66%);
    animation: shimmer 7s ease-in-out infinite;
    pointer-events: none; z-index: 0;
  }
  @keyframes shimmer {
    0%,100% { transform: translateX(-20%) skewX(-8deg); opacity:0; }
    8%       { opacity:1; }
    48%      { transform: translateX(240%) skewX(-8deg); opacity:1; }
    49%      { opacity:0; }
    99%      { opacity:0; }
  }

  /* corner accent */
  .login-card::after {
    content: '';
    position: absolute; inset: 0; border-radius: 20px;
    background:
      linear-gradient(to right,  rgba(201,146,42,0.2), transparent 40%) top    left  / 64px 1px no-repeat,
      linear-gradient(to bottom, rgba(201,146,42,0.2), transparent 40%) top    left  / 1px 64px no-repeat,
      linear-gradient(to left,   rgba(201,146,42,0.2), transparent 40%) bottom right / 64px 1px no-repeat,
      linear-gradient(to top,    rgba(201,146,42,0.2), transparent 40%) bottom right / 1px 64px no-repeat;
    pointer-events: none; z-index: 0;
  }

  .login-card > * { position: relative; z-index: 1; }

  .logo-area { text-align: center; margin-bottom: 36px; }

  .logo-icon {
    font-size: 48px; display: block; margin-bottom: 12px;
    animation: icon-glow 3.5s ease-in-out infinite;
  }
  @keyframes icon-glow {
    0%,100% { filter: drop-shadow(0 0 14px rgba(201,146,42,0.4)); }
    50%      { filter: drop-shadow(0 0 28px rgba(201,146,42,0.75)) drop-shadow(0 0 8px rgba(245,220,150,0.3)); }
  }

  .logo-title {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 700; color: var(--gold);
    letter-spacing: 1px; margin-bottom: 6px;
    text-shadow: 0 0 28px rgba(201,146,42,0.28);
  }
  .logo-sub { font-size:11px; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,146,42,0.25), transparent);
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size:10px; color:var(--text3);
    text-transform:uppercase; letter-spacing:1.2px; font-weight:500; margin-bottom:8px;
  }
  .form-group input {
    width: 100%;
    background: rgba(36,34,24,0.85);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 13px 16px; border-radius: 10px;
    font-size: 16px; font-family: var(--font-label);
    outline: none; transition: border-color 0.25s, box-shadow 0.25s;
    -webkit-appearance: none;
  }
  .form-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,146,42,0.1), 0 0 18px rgba(201,146,42,0.08);
  }
  .form-group input::placeholder { color:var(--text3); font-size:13px; }

  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 48px; }

  .toggle-pw {
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--text3); cursor:pointer;
    font-size:16px; padding:4px; line-height:1; transition:color .2s;
  }
  .toggle-pw:hover { color: var(--gold); }

  .error-msg {
    display:none; background:rgba(226,75,74,0.1); border:1px solid rgba(226,75,74,0.3);
    color:var(--red); padding:10px 14px; border-radius:8px;
    font-size:12px; margin-bottom:16px; line-height:1.5; letter-spacing:0.3px;
  }
  .error-msg.show { display: block; }

  .btn-login {
    width: 100%;
    background: linear-gradient(120deg, #A97020 0%, #C9922A 25%, #E8B455 50%, #C9922A 75%, #A97020 100%);
    background-size: 300% 100%;
    border: none; color: #0F0E0A; padding: 14px; border-radius: 10px;
    font-size: 13px; font-family: var(--font-label); font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-top: 8px;
    transition: opacity .2s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 22px rgba(201,146,42,0.28);
    animation: btn-flow 5s linear infinite;
  }
  @keyframes btn-flow {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .btn-login:hover { opacity:.91; box-shadow: 0 6px 32px rgba(201,146,42,0.42); }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity:.5; cursor:not-allowed; animation:none; }

  .spinner {
    display:inline-block; width:14px; height:14px;
    border:2px solid rgba(15,14,10,0.3); border-top-color:var(--bg);
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note {
    text-align:center; margin-top:24px; font-size:10px;
    color:var(--text3); letter-spacing:0.5px; line-height:1.6;
  }
  .footer-note span { display:block; margin-top:4px; color:rgba(201,146,42,0.4); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="aurora">
  <div class="aurora-beam"></div>
  <div class="aurora-beam"></div>
</div>
<div class="vignette"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo-area">
      <span class="logo-icon">🏅</span>
      <div class="logo-title">Vàng Tích Trữ</div>
      <div class="logo-sub">Xác thực để tiếp tục</div>
    </div>

    <div class="divider"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" autocapitalize="none">
    </div>

    <div class="form-group">
      <label>Mật khẩu</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePw()" title="Hiện/ẩn mật khẩu">👁</button>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <span id="btn-text">Đăng nhập</span>
    </button>

    <div class="footer-note">
      Hệ thống riêng tư — chỉ dành cho thành viên
      <span>🔒 Bảo mật bởi Supabase Auth</span>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   CANVAS — gold particles + hex grid + scanline
══════════════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, dpr;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  const GOLDS = ['rgba(201,146,42,','rgba(232,180,80,','rgba(245,215,150,','rgba(158,108,28,','rgba(255,198,88,'];
  const rand  = (a,b) => a + Math.random()*(b-a);
  const COUNT = 70;
  let particles = [];

  class P {
    constructor(init) {
      this.x  = init ? rand(0, W) : (Math.random()<.5 ? -6 : W+6);
      this.y  = init ? rand(0, H) : rand(0, H);
      this.vx = rand(-0.15, 0.15);
      this.vy = rand(-0.28, -0.08);
      this.r  = rand(0.9, 2.5);
      this.a  = rand(0.12, 0.52);
      this.pa = this.a;
      this.ps = rand(0.005, 0.018);
      this.pp = rand(0, Math.PI*2);
      this.c  = GOLDS[Math.floor(Math.random()*GOLDS.length)];
      this.flare = Math.random() < 0.07;
      if (this.flare) { this.r = rand(3,5.5); this.a = rand(0.07,0.2); }
    }
    update(t) {
      this.x += this.vx; this.y += this.vy;
      this.a = this.pa*(0.55 + 0.45*Math.sin(t*this.ps + this.pp));
      if (this.x < -12) this.x = W+12;
      if (this.x > W+12) this.x = -12;
      if (this.y < -12) { this.y = H+12; this.x = rand(0,W); }
    }
    draw() {
      ctx.save();
      if (this.flare) {
        const g = ctx.createRadialGradient(this.x,this.y,0, this.x,this.y,this.r*3.5);
        g.addColorStop(0,   this.c+(this.a).toFixed(3)+')');
        g.addColorStop(.45, this.c+(this.a*.45).toFixed(3)+')');
        g.addColorStop(1,   this.c+'0)');
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r*3.5,0,Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
      } else {
        ctx.globalAlpha = this.a;
        ctx.fillStyle = this.c+'1)';
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
  }

  function init() {
    resize();
    particles = [];
    for (let i=0;i<COUNT;i++) particles.push(new P(true));
  }

  function drawLines() {
    const D = 115;
    for (let i=0;i<particles.length;i++) {
      for (let j=i+1;j<particles.length;j++) {
        const a=particles[i], b=particles[j];
        const dx=a.x-b.x, dy=a.y-b.y, d=Math.sqrt(dx*dx+dy*dy);
        if (d<D) {
          ctx.save();
          ctx.globalAlpha = (1-d/D)*0.042;
          ctx.strokeStyle = 'rgba(201,146,42,1)';
          ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
          ctx.restore();
        }
      }
    }
  }

  function drawHex() {
    const sz=42, hx=sz*Math.sqrt(3), hy=sz*1.5;
    ctx.save();
    ctx.strokeStyle='rgba(201,146,42,0.026)';
    ctx.lineWidth=0.55;
    for (let r=-1;r<Math.ceil(H/hy)+2;r++) {
      for (let c=-1;c<Math.ceil(W/hx)+2;c++) {
        const cx=c*hx+(r%2===0?0:hx/2), cy=r*hy;
        ctx.beginPath();
        for (let k=0;k<6;k++) {
          const a=Math.PI/3*k-Math.PI/6;
          k===0 ? ctx.moveTo(cx+sz*Math.cos(a),cy+sz*Math.sin(a))
                : ctx.lineTo(cx+sz*Math.cos(a),cy+sz*Math.sin(a));
        }
        ctx.closePath(); ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawCornerGlows() {
    const g1=ctx.createRadialGradient(0,H,0,0,H,W*.45);
    g1.addColorStop(0,'rgba(201,146,42,0.052)'); g1.addColorStop(1,'rgba(201,146,42,0)');
    ctx.fillStyle=g1; ctx.fillRect(0,0,W,H);
    const g2=ctx.createRadialGradient(W,0,0,W,0,W*.38);
    g2.addColorStop(0,'rgba(201,146,42,0.038)'); g2.addColorStop(1,'rgba(201,146,42,0)');
    ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);
  }

  let scanY = 0, t = 0;
  function drawScan() {
    scanY = (scanY + 0.3) % (H * 1.6) - H * 0.3;
    const g=ctx.createLinearGradient(0,scanY-90,0,scanY+90);
    g.addColorStop(0,'rgba(201,146,42,0)');
    g.addColorStop(.45,'rgba(201,146,42,0.02)');
    g.addColorStop(.5,'rgba(245,218,145,0.036)');
    g.addColorStop(.55,'rgba(201,146,42,0.02)');
    g.addColorStop(1,'rgba(201,146,42,0)');
    ctx.fillStyle=g; ctx.fillRect(0,scanY-90,W,180);
  }

  function loop() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0F0E0A'; ctx.fillRect(0,0,W,H);
    drawHex();
    drawCornerGlows();
    drawScan();
    drawLines();
    particles.forEach(p=>{ p.update(t); p.draw(); });
    t++;
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', ()=>{ resize(); });
  init();
  loop();
})();

/* ══════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════ */
const SUPABASE_URL = window.SecureConfig.SUPABASE_URL;
const SUPABASE_KEY = window.SecureConfig.SUPABASE_ANON_KEY;

const { createClient } = supabase;
const auth = createClient(SUPABASE_URL, SUPABASE_KEY);

// Nếu login.html bị load trong iframe, thoát ra top-level ngay
if (window.top && window.top !== window) {
  window.top.location.replace(window.location.href);
}

(async () => {
  const { data: { session } } = await auth.auth.getSession();
  if (session) window.location.replace('index.html');
})();

function togglePw() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('show');
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }
function setLoading(on) {
  const btn = document.getElementById('btn-login');
  const txt = document.getElementById('btn-text');
  btn.disabled = on;
  txt.innerHTML = on ? '<span class="spinner"></span> Đang xác thực...' : 'Đăng nhập';
}

async function doLogin() {
  hideError();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email)    { showError('Vui lòng nhập email.'); return; }
  if (!password) { showError('Vui lòng nhập mật khẩu.'); return; }
  setLoading(true);
  const { error } = await auth.auth.signInWithPassword({ email, password });
  if (error) {
    setLoading(false);
    if (error.message.includes('Invalid login')) showError('Email hoặc mật khẩu không đúng.');
    else if (error.message.includes('Email not confirmed')) showError('Email chưa được xác nhận. Kiểm tra hộp thư.');
    else showError('Lỗi: ' + error.message);
    return;
  }
  window.location.replace('index.html');
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>

<style>
  :root{
    --bg:#f2f7f2;
    --bg2:#e8f0e8;
    --card:#ffffff;
    --card2:#f9fafb;
    --text:#0d1117;
    --text2:#374151;
    --muted:#8b95a8;
    --border:#d8e8d8;
    --border2:#c4d8c4;
    --primary:#3aab1e;
    --primary-2:#2d8c16;
    --primary-glow:rgba(58,171,30,.18);

    --accent-glow:rgba(59,126,255,.15);
    --warn:#f59e0b;
    --danger:#f04060;
    --p:#f04060; --c:#f59e0b; --f:#8b5cf6; --w:#06b6d4;
    --shadow-sm:0 1px 3px rgba(13,17,23,.06),0 4px 16px rgba(13,17,23,.06);
    --shadow:0 2px 8px rgba(13,17,23,.06),0 12px 40px rgba(13,17,23,.10);
    --shadow-lg:0 4px 16px rgba(13,17,23,.08),0 24px 64px rgba(13,17,23,.14);

    --radius:20px;

    --font:'DM Sans',system-ui,sans-serif;

  .dark{

    --card:#0d1f10; --card2:#122016;
    --text:#f0f7f0; --text2:#c4d8c4;
    --muted:#5a7860;
    --border:#1a3020; --border2:#224030;
    --shadow-sm:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
    --shadow:0 2px 8px rgba(0,0,0,.3),0 12px 40px rgba(0,0,0,.4);
    --shadow-lg:0 4px 16px rgba(0,0,0,.4),0 24px 64px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
  html{font-size:16px;touch-action:manipulation}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-font-smoothing:antialiased}
  html,body{height:100%}
  body{min-height:100vh;min-height:100dvh} body.app-open{padding-bottom:calc(84px + env(safe-area-inset-bottom))}
  /* Lock viewport on auth screen to avoid extra whitespace below */
  body:not(.app-open){height:100vh;height:100dvh;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-appearance:none}
  input,select,textarea{font-family:inherit;font-size:16px;-webkit-appearance:none;appearance:none;border-radius:0}
  a{color:var(--accent);text-decoration:none}
  .container{max-width:780px;margin:0 auto;padding:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:12px;transition:box-shadow .2s;animation:fadeUp .35s ease both}

  .card:nth-child(3){animation-delay:.08s}
  .card:nth-child(4){animation-delay:.12s}
  .card:nth-child(5){animation-delay:.16s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .row{display:flex;gap:10px;align-items:center}
  .between{justify-content:space-between}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  h1,h2,h3{margin:0 0 6px;letter-spacing:-.02em}

  .display{font-family:var(--font-display)}

  .ring{position:relative;width:190px;height:190px;margin:0 auto}

  .ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}

  .chip{display:inline-flex;align-items:center;gap:4px;padding:7px 13px;border-radius:99px;background:var(--bg2);border:1.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}

  .center-screen{min-height:100vh;min-height:100dvh;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(25,194,95,.12),transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(59,126,255,.10),transparent 70%),var(--bg)}
  .auth-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow-lg);padding:32px 28px;animation:fadeUp .4s ease both}

  .hidden{display:none!important}
  .icon-box{width:42px;height:42px;border-radius:12px;background:var(--bg2);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);flex-shrink:0}
  .divider{height:1px;background:var(--border);margin:12px 0}
  #scanPreview img{width:100%;max-height:220px;object-fit:cover;border-radius:16px;box-shadow:var(--shadow)}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
  @media(min-width:780px){.nav{border-radius:20px;left:16px;right:16px;bottom:16px;max-width:780px;margin:0 auto;border:1px solid var(--border)}}
</style>
</head>

<script>
/* ============================================================
   CONFIG — paste your keys here (or use Settings → Config UI)
============================================================ */
const _d=(b,s)=>{let k=s;return atob(b).split('').map(c=>{k=(k*1664525+1013904223)&0xffffffff;return String.fromCharCode(c.charCodeAt(0)^(k&0xff))}).join('')};
const CONFIG = {
  SUPABASE_URL:      _d('wnUYqw3/TxDzquOPh2pnrh/ixps3MdsjCzKVhJjuLacrQ22Ie8tjMA==',      0xA3F2C1B7),
  SUPABASE_ANON_KEY: _d('YeqcVRowCahj8nTMdYUbuBrK776B6WhkH+hHIzlkUkHy8DxkNvJzq7zY7eipUJvjjqcerwD+tzdmkf18Y2ascyiJfzSO/sdHBr9MvQhloPDkub5DPqQy/deKfC3ALlEf17rf6jG0Jxh/oU2sNhZfr0FhtBnBq1n7LFK2JDkgaDy3XSzeybiuIplW+lzTNr9f4EBlBH5K0JDJZvTQwsLY8lN9mO22Xr9RP1YRYXLAAkEee5Y+u0BusKwAVNDg9i7QkwL/k39vfOy2K5E12dN4AA==', 0xD7E4A2F9),
  // AI provider settings — loaded from Supabase ai_settings after auth
  AI_PROVIDER: 'gemini',         // 'gemini' | 'groq' | 'openrouter'
  GEMINI_API_KEY: '',
  GEMINI_MODEL: 'gemini-2.0-flash',
  GROQ_API_KEY: '',
  GROQ_MODEL: 'meta-llama/llama-4-scout-17b-16e-instruct',
  OPENROUTER_API_KEY: '',
  OPENROUTER_MODEL: 'google/gemini-2.0-flash-exp:free',
};

/* ============================================================
   AI SETTINGS — multi-provider, lưu vào Supabase ai_settings
   Key: 'ai_config'
   Value: { provider, gemini_key, gemini_model,
            groq_key, groq_model,
            openrouter_key, openrouter_model }
============================================================ */
async function loadAiSettings(){
  if(!sb) return;
  try{
    const {data,error}=await sb.from('ai_settings').select('value').eq('key','ai_config').maybeSingle();
    if(error){ console.warn('ai_settings load error:',error.message); return; }
    if(data?.value){
      const v=data.value;
      if(v.provider)          CONFIG.AI_PROVIDER         = v.provider;
      if(v.gemini_key)        CONFIG.GEMINI_API_KEY       = v.gemini_key;
      if(v.gemini_model)      CONFIG.GEMINI_MODEL         = v.gemini_model;
      if(v.groq_key)          CONFIG.GROQ_API_KEY         = v.groq_key;
      if(v.groq_model)        CONFIG.GROQ_MODEL           = v.groq_model;
      if(v.openrouter_key)    CONFIG.OPENROUTER_API_KEY   = v.openrouter_key;
      if(v.openrouter_model)  CONFIG.OPENROUTER_MODEL     = v.openrouter_model;
    }
  }catch(e){ console.warn(e); }
}

async function saveAiSettings(cfg){
  if(!sb) return false;
  try{
    const {error}=await sb.from('ai_settings').upsert({key:'ai_config', value:cfg});
    if(error) throw error;
    if(cfg.provider)         CONFIG.AI_PROVIDER        = cfg.provider;
    if(cfg.gemini_key)       CONFIG.GEMINI_API_KEY      = cfg.gemini_key;
    if(cfg.gemini_model)     CONFIG.GEMINI_MODEL        = cfg.gemini_model;
    if(cfg.groq_key)         CONFIG.GROQ_API_KEY        = cfg.groq_key;
    if(cfg.groq_model)       CONFIG.GROQ_MODEL          = cfg.groq_model;
    if(cfg.openrouter_key)   CONFIG.OPENROUTER_API_KEY  = cfg.openrouter_key;
    if(cfg.openrouter_model) CONFIG.OPENROUTER_MODEL    = cfg.openrouter_model;
    return true;
  }catch(e){ console.warn(e); return false; }
}

/* ============================================================
   AI CALL — unified wrapper cho cả 3 provider
   supports: text-only (coach) and vision (scan photo)
============================================================ */
/* ============================================================
   AI CALL — unified wrapper với auto-rotation khi hết quota
   Thứ tự fallback: provider hiện tại → provider 2 → provider 3
============================================================ */
function isRetryableAIError(err){
  const msg = String(err?.message || err || '');
  return /QUOTA|429|402|500|502|503|504|RESOURCE_EXHAUSTED|UNAVAILABLE|overload|overloaded|high demand|temporar|try again later|rate.?limit|quota|credits|exceeded/i.test(msg);
}

function friendlyAIError(err){
  const msg = String(err?.message || err || '');
  if(isRetryableAIError(msg)){
    return 'AI đang quá tải hoặc hết lượt tạm thời. App đã tự thử model/provider dự phòng nhưng chưa có phản hồi ổn định. Vui lòng bấm quét lại sau vài giây, hoặc vào Cài đặt AI thêm OpenRouter key để có fallback tốt hơn.';
  }
  if(/api key|key|permission|unauthorized|forbidden|401|403/i.test(msg)){
    return 'API key AI chưa đúng hoặc chưa có quyền dùng model nhận diện ảnh. Vui lòng kiểm tra lại trong Cài đặt AI.';
  }
  return 'Chưa phân tích được ảnh. Hãy thử ảnh rõ hơn, đủ sáng hơn hoặc chụp gần phần thức ăn.';
}

function parseAIJson(text){
  const clean = String(text || '').replace(/```json|```/gi,'').trim();
  const start = clean.indexOf('{');
  if(start < 0) throw new Error('AI không trả về JSON');
  let depth = 0, inString = false, escaped = false;
  for(let i=start;i<clean.length;i++){
    const ch = clean[i];
    if(inString){
      if(escaped){ escaped = false; continue; }
      if(ch === '\\'){ escaped = true; continue; }
      if(ch === '"') inString = false;
      continue;
    }
    if(ch === '"'){ inString = true; continue; }
    if(ch === '{') depth++;
    if(ch === '}'){
      depth--;
      if(depth === 0) return JSON.parse(clean.slice(start, i + 1));
    }
  }
  throw new Error('JSON từ AI bị thiếu dấu đóng');
}

function normalizeNutritionResult(raw){
  raw = raw || {};
  const num = v => Number.isFinite(Number(v)) ? Number(v) : 0;
  const items = Array.isArray(raw.items) ? raw.items.map(it=>({
    name: it?.name || 'Thành phần',
    calories: num(it?.calories), protein: num(it?.protein), carbs: num(it?.carbs), fat: num(it?.fat)
  })) : [];
  let confidence = num(raw.confidence);
  if(confidence > 1) confidence = confidence / 100;
  confidence = Math.max(0, Math.min(1, confidence));
  const dishName = raw.dish_name || raw.food_name || raw.name || items[0]?.name || 'Món ăn';
  return {
    dish_name: dishName,
    calories: Math.max(0, Math.round(num(raw.calories))),
    protein: Math.max(0, Math.round(num(raw.protein))),
    carbs: Math.max(0, Math.round(num(raw.carbs))),
    fat: Math.max(0, Math.round(num(raw.fat))),
    fiber: Math.max(0, Math.round(num(raw.fiber))),
    sugar: Math.max(0, Math.round(num(raw.sugar))),
    sodium: Math.max(0, Math.round(num(raw.sodium))),
    confidence,
    items,
    advice: raw.advice || ''
  };
}

async function readJsonSafe(response){
  const txt = await response.text();
  try{ return txt ? JSON.parse(txt) : {}; }
  catch{ return { error: { message: txt || `HTTP ${response.status}` } }; }
}

async function callAIWithProvider(provider, {prompt, imageBase64=null}){
  // --- GEMINI ---
  if(provider==='gemini'){
    if(!CONFIG.GEMINI_API_KEY) return null;
    const modelList = [...new Set([CONFIG.GEMINI_MODEL, 'gemini-2.0-flash', 'gemini-2.5-flash-lite'].filter(Boolean))];
    let lastTransient = null;
    for(const model of modelList){
      const parts=[{text:prompt}];
      if(imageBase64) parts.push({inline_data:{mime_type:'image/jpeg',data:imageBase64}});
      const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${CONFIG.GEMINI_API_KEY}`;
      const body={contents:[{parts}], generationConfig: imageBase64?{responseMimeType:'application/json', temperature:0.2}: {temperature:0.4}};
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const j=await readJsonSafe(r);
      if(!r.ok || j.error){
        const errText = `${r.status} ${j.error?.code||''} ${j.error?.status||''} ${j.error?.message||''}`;
        if(isRetryableAIError(errText)){
          lastTransient = new Error(errText || 'QUOTA');
          console.warn(`[AI] Gemini model ${model} quá tải, thử model khác...`);
          continue;
        }
        throw new Error(j.error?.message || `Gemini HTTP ${r.status}`);
      }
      const text = j.candidates?.[0]?.content?.parts?.[0]?.text || null;
      if(text){
        if(model !== CONFIG.GEMINI_MODEL){
          CONFIG.GEMINI_MODEL = model;
          toast(`⚠️ Đổi sang ${model} do model cũ quá tải`);
        }
        return text;
      }
    }
    if(lastTransient) throw new Error('QUOTA');
    return null;
  }
  // --- GROQ ---
  if(provider==='groq'){
    if(!CONFIG.GROQ_API_KEY) return null;
    if(imageBase64) return null; // Groq không hỗ trợ vision
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+CONFIG.GROQ_API_KEY},
      body:JSON.stringify({model:CONFIG.GROQ_MODEL,messages:[{role:'user',content:prompt}],max_tokens:1024,temperature:0.3})
    });
    const j=await readJsonSafe(r);
    if(!r.ok || j.error){ const errText = `${r.status} ${j.error?.code||''} ${j.error?.type||''} ${j.error?.message||''}`; if(isRetryableAIError(errText)) throw new Error('QUOTA'); throw new Error(j.error?.message||`Groq HTTP ${r.status}`); }
    return j.choices?.[0]?.message?.content||null;
  }
  // --- OPENROUTER ---
  if(provider==='openrouter'){
    if(!CONFIG.OPENROUTER_API_KEY) return null;
    const messages=[];
    if(imageBase64){
      messages.push({role:'user',content:[{type:'text',text:prompt},{type:'image_url',image_url:{url:'data:image/jpeg;base64,'+imageBase64}}]});
    } else {
      messages.push({role:'user',content:prompt});
    }
    const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+CONFIG.OPENROUTER_API_KEY,
        'HTTP-Referer':'https://nutrition-tracker.app','X-Title':'AI Nutrition Tracker'},
      body:JSON.stringify({model:CONFIG.OPENROUTER_MODEL,messages,max_tokens:1024,temperature:0.2})
    });
    const j=await readJsonSafe(r);
    if(!r.ok || j.error){ const errText = `${r.status} ${j.error?.code||''} ${j.error?.type||''} ${j.error?.message||''}`; if(isRetryableAIError(errText)) throw new Error('QUOTA'); throw new Error(j.error?.message||`OpenRouter HTTP ${r.status}`); }
    return j.choices?.[0]?.message?.content||null;
  }
  return null;
}

async function callAI({prompt, imageBase64=null}){
  const allProviders = imageBase64 ? ['gemini','openrouter'] : ['gemini','groq','openrouter'];
  const primary = CONFIG.AI_PROVIDER;
  const order = [primary, ...allProviders.filter(p=>p!==primary)].filter((p,i,a)=>allProviders.includes(p) && a.indexOf(p)===i);
  let lastError = null;

  for(const provider of order){
    const key = provider==='gemini'?CONFIG.GEMINI_API_KEY:provider==='groq'?CONFIG.GROQ_API_KEY:CONFIG.OPENROUTER_API_KEY;
    if(!key) continue;
    try{
      const result = await callAIWithProvider(provider, {prompt, imageBase64});
      if(result){
        if(provider!==primary){
          CONFIG.AI_PROVIDER=provider;
          toast(`⚠️ Đổi sang ${provider} do AI hiện tại quá tải`);
        }
        return result;
      }
    }catch(e){
      lastError = e;
      if(e.message==='QUOTA' || isRetryableAIError(e)){
        console.warn(`[AI] ${provider} quá tải/hết quota, thử provider tiếp theo...`);
        continue;
      }
      throw e;
    }
  }
  if(lastError) throw lastError;
  return null;
}

/* ============================================================
   NUTRITION MATH
============================================================ */
function calcBMR(p){
  if(!p.weight||!p.height||!p.age) return 0;
  // Mifflin-St Jeor
  const s = p.gender==='female' ? -161 : 5;
  return 10*p.weight + 6.25*p.height - 5*p.age + s;
}
function calcTDEE(p){
  const m = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very:1.9};
  return calcBMR(p) * (m[p.activity]||1.375);
}
function targetCalories(p){
  const t = calcTDEE(p);
  if(p.goal==='loss') return Math.round(t-500);
  if(p.goal==='bulk') return Math.round(t+300);
  if(p.goal==='recomp') return Math.round(t);
  return Math.round(t);
}
function macroTargets(p){
  const cals = targetCalories(p);
  // recomp: higher protein (40%), lower carbs (30%), fat 30%
  const isRecomp = p.goal==='recomp';
  return {
    calories: cals,
    protein: Math.round(cals*(isRecomp?0.40:0.30)/4),
    carbs: Math.round(cals*(isRecomp?0.30:0.40)/4),
    fat: Math.round(cals*0.30/9),
    fiber: 30,
    water: 2500
  };
}

async function afterAuth(){

  const uid=data.user.id;

  // Load profiles: thử theo id (chuẩn mới: user_id+'_husband' / user_id+'_wife')
  const [{data:hRow},{data:wRow}] = await Promise.all([
    sb.from('profiles').select('*').eq('id',uid+'_husband').maybeSingle(),

  ]);

  // Fallback: schema cũ dùng id = auth.uid
  const {data:legacyProf}=await sb.from('profiles').select('*').eq('id',uid).maybeSingle();

  if(hRow){
    State.profiles.husband=mapProfile(hRow);
  } else if(legacyProf && (legacyProf.role==='husband'||!legacyProf.role)){
    State.profiles.husband={...mapProfile(legacyProf), profileKey:'husband', profile_key:'husband'};
  } else {
    State.profiles.husband={
      name: data.user.email.split('@')[0], profileKey:'husband', profile_key:'husband',
      gender:'male', age:30, height:170, weight:70, goalWeight:65, activity:'moderate', goal:'maintain'
    };
    try{ await sb.from('profiles').upsert({id:uid+'_husband', user_id:uid, profile_key:'husband', name:State.profiles.husband.name, gender:State.profiles.husband.gender, age:State.profiles.husband.age, height:State.profiles.husband.height, weight:State.profiles.husband.weight, goal_weight:State.profiles.husband.goalWeight, activity:State.profiles.husband.activity, goal:State.profiles.husband.goal}); }catch(e){console.warn(e)}

    State.profiles.wife=mapProfile(wRow);
  } else if(legacyProf && legacyProf.role==='wife'){
    State.profiles.wife={...mapProfile(legacyProf), profileKey:'wife', profile_key:'wife'};
  } else {
    State.profiles.wife={
      name: 'Vợ', profileKey:'wife', profile_key:'wife',
      gender:'female', age:28, height:160, weight:55, goalWeight:52, activity:'light', goal:'maintain'
    };

  }

  State.activeProfile='husband';
  State.profile=State.profiles.husband;
  await loadCloud();
  await loadAiSettings();
  enterApp();
}

function todayTotals(profileKey){
  const key = profileKey || State.activeProfile;
  const t={calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0,sodium:0};
  const d=today();
  State.meals.filter(m=>(m.date||m.created_at||'').slice(0,10)===d && (m.profile_key||m.profileKey||'husband')===key).forEach(m=>{
    t.calories+=+m.calories||0; t.protein+=+m.protein||0; t.carbs+=+m.carbs||0;
    t.fat+=+m.fat||0; t.fiber+=+m.fiber||0; t.sugar+=+m.sugar||0; t.sodium+=+m.sodium||0;
  });
  const w = State.water.filter(x=>(x.date||x.created_at||'').slice(0,10)===d && (x.profile_key||x.profileKey||'husband')===key).reduce((a,b)=>a+(+b.ml||0),0);
  return {...t, water:w};
}

      <button class="btn secondary" data-quick="weight"><i data-lucide="scale"></i> Cân</button>
    </div>

function statCard(label, cur, max, unit, klass){
  const pct=Math.min(100,(cur/max)*100||0);
  return `<div class="card" style="margin:0">
    <div class="row between"><span class="badge ${klass}">${label}</span><span class="muted">${fmt(cur)}/${fmt(max)} ${unit}</span></div>
    <div class="progress" style="margin-top:8px"><div style="width:${pct}%;background:${pieColor(klass)}"></div></div>
  </div>`;
}
function pieColor(k){return ({'b-p':'var(--p)','b-c':'var(--c)','b-f':'var(--f)','b-w':'var(--w)'})[k]||'var(--primary)'}

function ringSvg(pct, big, small){
  const r=78, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<div class="ring"><svg width="180" height="180">
    <circle cx="90" cy="90" r="${r}" stroke="var(--bg)" stroke-width="14" fill="none"/>
    <circle cx="90" cy="90" r="${r}" stroke="url(#g)" stroke-width="14" fill="none" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}"/>

function diaryDateStr(){
  // Always return a concrete YYYY-MM-DD string
  if(State.diaryDate) return State.diaryDate;
  return today();
}
function diaryIsToday(){ return diaryDateStr() === today(); }
function diaryShift(delta){
  // Block moving forward past today
  if(delta > 0 && diaryIsToday()) return;
  // Parse current date safely using local-time parts to avoid timezone shift
  const cur = diaryDateStr();
  const [y,mo,dd] = cur.split('-').map(Number);
  const d = new Date(y, mo-1, dd);   // local time constructor — no timezone offset
  d.setDate(d.getDate() + delta);
  const pad = n => String(n).padStart(2,'0');
  const s = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  State.diaryDate = s === today() ? null : s;
  render();
}
function viewDiary(){
  const d = diaryDateStr();
  const isToday = diaryIsToday();
  const labelDate = isToday ? 'Hôm nay' : new Date(d+'T00:00:00').toLocaleDateString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
  const day = State.meals.filter(m=>(m.date||m.created_at||'').slice(0,10)===d && (m.profile_key||m.profileKey||'husband')===State.activeProfile);
  const by = {breakfast:[],lunch:[],dinner:[],snack:[]};
  day.forEach(m=>{ (by[m.meal_type||'snack']||by.snack).push(m); });

  // daily totals
  const tot = {calories:0,protein:0,carbs:0,fat:0};
  day.forEach(m=>{tot.calories+=+m.calories||0;tot.protein+=+m.protein||0;tot.carbs+=+m.carbs||0;tot.fat+=+m.fat||0;});

  const dateNav = `

        <button class="btn small ghost" id="diaryNext" style="width:36px;height:36px;padding:0;border-radius:10px;${isToday?'opacity:.35;pointer-events:none':''}"><i data-lucide="chevron-right"></i></button>

      }
    }
    modal.querySelectorAll('#itemsTbody tr').forEach(tr=>{
      tr.querySelectorAll('input').forEach(inp=>inp.oninput=()=>syncRow(tr));
    });
  }

  document.body.appendChild(modal);
  renderModal();
}

async function compressImage(file, max=1024, q=0.8){
  return new Promise((res,rej)=>{
    const img=new Image(); const r=new FileReader();
    r.onload=()=>{img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>h&&w>max){h=h*max/w;w=max} else if(h>max){w=w*max/h;h=max}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>res({blob:b,dataUrl:c.toDataURL('image/jpeg',q)}),'image/jpeg',q);
    };img.src=r.result};r.readAsDataURL(file);
  });
}

  const goalLabel = p.goal==='loss'?'giảm cân':p.goal==='bulk'?'tăng cơ':p.goal==='recomp'?'giảm mỡ tăng cơ':'duy trì cân nặng';

  const prompt = `Bạn là chuyên gia dinh dưỡng chuyên về ẩm thực Việt Nam và quốc tế.

NHIỆM VỤ: Phân tích ảnh thức ăn và trả về JSON chính xác. KHÔNG trả về gì ngoài JSON.

DỮ LIỆU NGƯỜI DÙNG (${profileLabel}):
- Mục tiêu: ${goalLabel}
- Calo mục tiêu/ngày: ${tgt.calories} kcal
- Đã nạp hôm nay: ${tot.calories} kcal
- Còn lại: ${remainCal} kcal
- Protein mục tiêu: ${tgt.protein}g (đã nạp: ${tot.protein}g)

YÊU CẦU NHẬN DIỆN:
- Nhận diện TẤT CẢ các món trong ảnh (kể cả nhiều món cùng lúc)
- Ưu tiên nhận diện món Việt: Phở, Bún bò Huế, Cơm tấm, Bánh mì, Hủ tiếu, Bún chả, Bún riêu, Mì Quảng, Cháo, Xôi, Bánh cuốn, Bánh xèo, Gỏi cuốn, Cơm gà, Bún thịt nướng, Cơm tôm thịt trứng, v.v.
- Nếu ảnh rõ là đồ ăn nhưng không chắc tên, hãy đưa ra tên có khả năng nhất và giảm confidence; KHÔNG trả về "Không xác định" trừ khi ảnh không phải thức ăn
- Ước tính khẩu phần dựa trên kích thước nhìn thấy trong ảnh
- Tính toán dinh dưỡng CHÍNH XÁC cho tổng toàn bộ phần ăn nhìn thấy

LỜI KHUYÊN (advice): Dựa vào dữ liệu người dùng ở trên, cho lời khuyên NGẮN GỌN 1-2 câu bằng tiếng Việt: có nên ăn không, có phù hợp với mục tiêu không, cần điều chỉnh gì.

Trả về JSON duy nhất (không markdown, không backtick):
{"dish_name":"tên món tiếng Việt","calories":0,"protein":0,"carbs":0,"fat":0,"fiber":0,"sugar":0,"sodium":0,"confidence":0.0,"items":[{"name":"tên món","calories":0,"protein":0,"carbs":0,"fat":0}],"advice":"lời khuyên tiếng Việt"}`;

  // Groq không hỗ trợ vision
  const hasVisionKey = (CONFIG.AI_PROVIDER==='gemini' && CONFIG.GEMINI_API_KEY)
                    || (CONFIG.AI_PROVIDER==='openrouter' && CONFIG.OPENROUTER_API_KEY)
                    || (CONFIG.GEMINI_API_KEY) // fallback to gemini for vision
                    || (CONFIG.OPENROUTER_API_KEY);

  if(!CONFIG.GEMINI_API_KEY && !CONFIG.OPENROUTER_API_KEY){
    const demo={dish_name:'Phở Bò',calories:450,protein:30,carbs:55,fat:12,fiber:3,sugar:5,sodium:1200,confidence:0.72,
      items:[{name:'Phở Bò tái',calories:450,protein:30,carbs:55,fat:12}],
      advice:`(Demo) Phở bò cung cấp ${450} kcal, bạn còn ${remainCal} kcal hôm nay. Phù hợp cho mục tiêu ${goalLabel}.`};
    return demo;
  }

  // Force vision-capable provider
  const origProvider = CONFIG.AI_PROVIDER;
  if(CONFIG.AI_PROVIDER==='groq'){
    if(CONFIG.GEMINI_API_KEY) CONFIG.AI_PROVIDER='gemini';
    else if(CONFIG.OPENROUTER_API_KEY) CONFIG.AI_PROVIDER='openrouter';
    else return {dish_name:'N/A',calories:0,protein:0,carbs:0,fat:0,confidence:0,advice:'Groq không hỗ trợ nhận diện ảnh. Vui lòng thêm Gemini hoặc OpenRouter key trong Cài đặt AI.'};
  }

  try{
    const txt = await callAI({prompt, imageBase64: base64});
    CONFIG.AI_PROVIDER = origProvider;
    if(!txt) throw new Error('Không có phản hồi từ AI');
    return normalizeNutritionResult(parseAIJson(txt));
  }catch(e){
    CONFIG.AI_PROVIDER = origProvider;
    return {dish_name:'Chưa nhận diện được',calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0,sodium:0,confidence:0,items:[],advice:friendlyAIError(e)};
  }
}

function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

async function coachAsk(q){
  State.chats.push({role:'user',text:q});
  render();
  const p=State.profile, tgt=macroTargets(p), tot=todayTotals();
  const profileLabel=State.activeProfile==='husband'?'Chồng':'Vợ';
  const ctx=`Hồ sơ người dùng (${profileLabel}): ${JSON.stringify(p)}. Mục tiêu hôm nay: ${JSON.stringify(tgt)}. Đã nạp hôm nay: ${JSON.stringify(tot)}. Bữa ăn gần đây: ${JSON.stringify(State.meals.filter(m=>(m.profile_key||m.profileKey||'husband')===State.activeProfile).slice(0,10).map(m=>({n:m.name,k:m.calories})))}. Cân nặng gần đây: ${JSON.stringify(State.weights.filter(w=>(w.profile_key||w.profileKey||'husband')===State.activeProfile).slice(-5))}.`;
  const prompt=`Bạn là chuyên gia dinh dưỡng cá nhân của hai vợ chồng người dùng. Chỉ trả lời bằng tiếng Việt, KHÔNG dùng tiếng Anh dù chỉ một từ.

QUY TẮC TRẢ LỜI BẮT BUỘC:
- Đi thẳng vào câu trả lời, KHÔNG mở đầu bằng "Tất nhiên!", "Chào bạn!", hay bất kỳ lời dẫn vòng vo nào.
- Trả lời NGẮN GỌN, tối đa 6-8 dòng trừ khi cần liệt kê thực đơn cụ thể.
- Luôn dùng số liệu cụ thể từ dữ liệu người dùng (kcal, gram, %).
- Nếu đề xuất món ăn: ghi rõ tên món (tiếng Việt) + kcal + protein/carb/fat.
- Nếu đánh giá tiến độ: so sánh đã nạp vs mục tiêu, nêu còn thiếu/thừa bao nhiêu.
- Kết thúc bằng 1 hành động cụ thể duy nhất nếu cần.

DỮ LIỆU NGƯỜI DÙNG (${profileLabel}): ${ctx}

Câu hỏi: ${q}`;

  const hasKey = CONFIG.AI_PROVIDER==='gemini'?CONFIG.GEMINI_API_KEY
               : CONFIG.AI_PROVIDER==='groq'?CONFIG.GROQ_API_KEY
               : CONFIG.OPENROUTER_API_KEY;

  let reply='';
  if(!hasKey){
    const remain=tgt.calories-tot.calories;
    reply=`(Demo) Bạn còn ${fmt(remain)} kcal. Cần thêm ${fmt(tgt.protein-tot.protein)}g protein nữa. Thử gà nướng + cơm + rau nhé!`;
  } else {
    try{
      const txt = await callAI({prompt});
      reply = txt || 'Không có phản hồi.';
    }catch(e){ reply='Lỗi: '+e.message; }
  }
  State.chats.push({role:'ai',text:reply});
  saveLocal(); render();
  setTimeout(()=>{const b=$('#chatBox');if(b) b.scrollTop=b.scrollHeight},50);
}

      const done=Math.abs((p.weight||0)-cur);
      const pct=total?Math.min(100,done/total*100):0;
      return `<div style="margin-bottom:10px"><div class="row between"><span>${label} ${p.name||''}</span><span class="muted">${cur}kg → ${p.goalWeight||'?'}kg</span></div><div class="progress" style="margin-top:4px"><div style="width:${pct}%;background:${key==='husband'?'#2d8c16':'#f04060'}"></div></div></div>`;
    }).join('')}
  </div>`;
}
function coupleCard(key){
  const p=State.profiles[key];
  if(!p) return `<div class="card"><div class="muted">Chưa có hồ sơ</div></div>`;
  const t=todayTotals(key);
  const tgt=macroTargets(p);
  const color=key==='husband'?'#2d8c16':'#f04060';
  const label=key==='husband'?'👨 Chồng':'👩 Vợ';
  const curW=State.weights.filter(w=>(w.profile_key||w.profileKey||'husband')===key).slice(-1)[0]?.value||p.weight;
  const pct=Math.min(100,(t.calories/tgt.calories)*100||0);
  return `<div class="card" style="border-top:3px solid ${color}">
    <h3>${label} ${p.name||''}</h3>
    <div class="muted" style="font-size:11px">Calories hôm nay</div>
    <div style="font-size:22px;font-weight:700">${fmt(t.calories)}</div>
    <div class="progress" style="margin:4px 0"><div style="width:${pct}%;background:${color}"></div></div>
    <div class="muted" style="font-size:11px">/${fmt(tgt.calories)} kcal</div>
    <div class="row between" style="margin-top:6px"><span class="muted" style="font-size:12px">Protein</span><b>${fmt(t.protein)}g</b></div>
    <div class="row between"><span class="muted" style="font-size:12px">Nước</span><b>${fmt(t.water)}ml</b></div>
    <div class="row between"><span class="muted" style="font-size:12px">Cân nặng</span><b>${curW} kg</b></div>
  </div>`;
}

/* ============================================================
   HANDLERS (re-attached after each render)
============================================================ */
function attachHandlers(){
  // nav-to-subview
  $$('[data-go]').forEach(b=>b.onclick=()=>{State.view=b.dataset.go;render()});

  // back button (subviews → more)
  if($('#backBtn')) $('#backBtn').onclick=()=>{
    const fromView=State.view;
    // subviews that come from "More" menu
    const moreSubviews=['profile','weight','water','reports','couple','admin','config'];
    State.view = moreSubviews.includes(fromView)?'more':'dashboard';
    render();
  };

  // dashboard quick adds
  $$('[data-quick]').forEach(b=>b.onclick=()=>{
    const q=b.dataset.quick;
    if(q==='water'){State.view='water';render()}
    if(q==='meal'){State.view='scan';render()}
    if(q==='weight'){State.view='weight';render()}
  });

  // Macro pie
  if($('#macroPie')){
    const t=todayTotals();
    new Chart($('#macroPie'),{type:'doughnut',data:{labels:['Protein','Carbs','Fat'],datasets:[{data:[t.protein*4,t.carbs*4,t.fat*9],backgroundColor:['#f43f5e','#f59e0b','#8b5cf6'],borderWidth:0}]},options:{plugins:{legend:{position:'bottom'}},cutout:'65%'}});
  }

  // Diary — date navigation
  if($('#diaryPrev')) $('#diaryPrev').onclick=()=>diaryShift(-1);
  if($('#diaryNext')) $('#diaryNext').onclick=()=>{ if(!diaryIsToday()) diaryShift(1); };

  // Diary — meal detail modal (tap on meal item)
  $$('[data-meal-detail]').forEach(el=>{
    el.onclick=e=>{
      // Don't open modal if the delete button was clicked
      if(e.target.closest('[data-del-meal]')) return;
      showMealDetail(el.dataset.mealDetail);
    };
  });

  $$('[data-add-meal]').forEach(b=>b.onclick=()=>{State.view='scan';render()});
  $$('[data-del-meal]').forEach(b=>b.onclick=async e=>{e.stopPropagation();await delMeal(b.dataset.delMeal);toast('Deleted');render()});

  // Scan
  if($('#camIn')) $('#camIn').onchange=e=>handleScanFile(e.target.files[0]);
  if($('#upIn')) $('#upIn').onchange=e=>handleScanFile(e.target.files[0]);
  // Manual entry — photo upload handlers
  function mRecalcTotals(){
    let tc=0,tp=0,tca=0,tf=0;
    $$('#mItemsTbody tr').forEach(tr=>{
      const q=+tr.querySelector('.mi-qty')?.value||1;
      tc  += (+tr.querySelector('.mi-cal')?.value||0)*q;
      tp  += (+tr.querySelector('.mi-p')?.value||0)*q;
      tca += (+tr.querySelector('.mi-c')?.value||0)*q;
      tf  += (+tr.querySelector('.mi-f')?.value||0)*q;
    });
    if($('#mTotCal')) $('#mTotCal').textContent=fmt(tc);
    if($('#mTotP'))   $('#mTotP').textContent=fmt(tp);
    if($('#mTotC'))   $('#mTotC').textContent=fmt(tca);
    if($('#mTotF'))   $('#mTotF').textContent=fmt(tf);
    return {calories:tc,protein:tp,carbs:tca,fat:tf};
  }
  function mAttachRowHandlers(){
    $$('#mItemsTbody tr').forEach(tr=>{
      tr.querySelectorAll('input').forEach(inp=>inp.oninput=()=>mRecalcTotals());
      const delBtn=tr.querySelector('.mi-del');
      if(delBtn) delBtn.onclick=()=>{ tr.remove(); mRecalcTotals(); };
    });
  }
  mAttachRowHandlers();

  if($('#mAddItem')) $('#mAddItem').onclick=()=>{
    const tbody=$('#mItemsTbody');
    const idx=tbody.querySelectorAll('tr').length;
    const tr=document.createElement('tr');
    tr.dataset.midx=idx;
    tr.innerHTML=`
      <td style="padding:4px 4px"><input class="input mi-name" type="text" placeholder="Tên thành phần" style="font-size:13px;padding:6px 8px"></td>
      <td style="padding:4px 4px"><input class="input mi-qty" type="number" min="0.1" step="0.1" value="1" style="font-size:13px;padding:6px 6px;text-align:center"></td>
      <td style="padding:4px 4px"><input class="input mi-unit" type="text" value="phần" style="font-size:13px;padding:6px 6px;text-align:center"></td>
      <td style="padding:4px 4px"><input class="input mi-cal" type="number" min="0" placeholder="0" style="font-size:13px;padding:6px 6px;text-align:center"></td>
      <td style="padding:4px 4px"><input class="input mi-p" type="number" min="0" placeholder="0" style="font-size:12px;padding:6px 4px;text-align:center;color:var(--p)"></td>
      <td style="padding:4px 4px"><input class="input mi-c" type="number" min="0" placeholder="0" style="font-size:12px;padding:6px 4px;text-align:center;color:var(--c)"></td>
      <td style="padding:4px 4px"><input class="input mi-f" type="number" min="0" placeholder="0" style="font-size:12px;padding:6px 4px;text-align:center;color:var(--f)"></td>
      <td style="padding:4px 4px;text-align:center"><button class="btn small ghost mi-del" style="width:28px;height:28px;padding:0;border-radius:8px;color:#ef4444"><i data-lucide="x"></i></button></td>`;
    tbody.appendChild(tr);
    lucide.createIcons();
    mAttachRowHandlers();
  };

  // Manual photo upload handlers
  async function handleManualPhoto(file){
    if(!file) return;
    const {blob,dataUrl}=await compressImage(file);
    $('#mPhotoPreview').innerHTML=`<img src="${dataUrl}" style="width:100%;max-height:160px;object-fit:cover;border-radius:14px"/>`;
    window._mPhotoBlob=blob; window._mPhotoDataUrl=dataUrl;
  }
  if($('#mCamIn')) $('#mCamIn').onchange=e=>handleManualPhoto(e.target.files[0]);
  if($('#mUpIn'))  $('#mUpIn').onchange=e=>handleManualPhoto(e.target.files[0]);

  if($('#mSave')) $('#mSave').onclick=async ()=>{
    const tot=mRecalcTotals();
    // Build items array from rows
    const items=[]; let hasItems=false;
    $$('#mItemsTbody tr').forEach(tr=>{
      const name=tr.querySelector('.mi-name')?.value||'';
      const qty=+tr.querySelector('.mi-qty')?.value||1;
      const unit=tr.querySelector('.mi-unit')?.value||'phần';
      const cal=+tr.querySelector('.mi-cal')?.value||0;
      const p=+tr.querySelector('.mi-p')?.value||0;
      const c=+tr.querySelector('.mi-c')?.value||0;
      const f=+tr.querySelector('.mi-f')?.value||0;
      if(name||cal) hasItems=true;
      items.push({name:name||'Thành phần',quantity:qty,unit,base_calories:cal,base_protein:p,base_carbs:c,base_fat:f});
    });

    // Upload photo if any
    let photoUrl='';
    if(window._mPhotoBlob){
      if(sb && !State.demo){
        try{
          const path=`${State.user.id}/${State.activeProfile}/${Date.now()}_manual.jpg`;
          const up=await sb.storage.from('food-photos').upload(path,window._mPhotoBlob,{contentType:'image/jpeg',upsert:true});
          if(!up.error) photoUrl=sb.storage.from('food-photos').getPublicUrl(path).data.publicUrl;
        }catch(e){console.warn(e)}
      }
      if(!photoUrl && window._mPhotoDataUrl) photoUrl=window._mPhotoDataUrl;
    }

    const name=$('#mName').value||'Food';
    const m={
      id:uid(), name,
      calories:Math.round(tot.calories), protein:Math.round(tot.protein),
      carbs:Math.round(tot.carbs), fat:Math.round(tot.fat),
      meal_type:$('#mMeal').value, date:today(),
      created_at:new Date().toISOString(),
      photo:photoUrl||'',
      items: hasItems ? items : []
    };
    await addMeal(m);
    window._mPhotoBlob=null; window._mPhotoDataUrl=null;
    toast('✅ Đã thêm vào nhật ký!'); State.view='diary'; render();
  };

  // Coach
  if($('#chatSend')){
    const send=()=>{const v=$('#chatIn').value.trim();if(!v) return; $('#chatIn').value='';coachAsk(v)};
    $('#chatSend').onclick=send;
    $('#chatIn').onkeydown=e=>{if(e.key==='Enter') send()};
    const b=$('#chatBox');if(b) b.scrollTop=b.scrollHeight;
  }

  // Profile
  if($('#pSave')) $('#pSave').onclick=async ()=>{
    const btn=$('#pSave');
    btn.textContent='⏳ Đang lưu...'; btn.disabled=true;
    const updated={
      id: State.user.id+'_'+State.activeProfile,
      user_id: State.user.id,
      profile_key: State.activeProfile,
      profileKey: State.activeProfile,
      name:$('#pName').value.trim(),
      gender:$('#pGender').value,
      age:+$('#pAge').value,
      height:+$('#pHeight').value,
      weight:+$('#pWeight').value,
      goalWeight:+$('#pGoalW').value,
      activity:$('#pActivity').value,
      goal:$('#pGoal').value,
    };
    State.profiles[State.activeProfile]=updated;
    State.profile=updated;
    if(sb && !State.demo){
      const dbRow={
        id: updated.id, user_id: updated.user_id, profile_key: updated.profile_key,
        name: updated.name, gender: updated.gender, age: updated.age,
        height: updated.height, weight: updated.weight,
        goal_weight: updated.goalWeight,
        activity: updated.activity, goal: updated.goal,
      };
      const {error}=await sb.from('profiles').upsert(dbRow);
      if(error){ toast('❌ Lỗi lưu: '+error.message); btn.textContent='Lưu hồ sơ'; btn.disabled=false; return; }
    }
    saveLocal();
    toast('✅ Đã lưu hồ sơ thành công!');
    updateProfileSwitcherUI();
    btn.textContent='✅ Đã lưu'; btn.disabled=false;
    setTimeout(()=>render(),800);
  };

  // Weight
  if($('#wSave')) $('#wSave').onclick=async ()=>{
    const v=+$('#wVal').value;if(!v) return;
    const w={id:uid(),date:today(),value:v,user_id:State.user.id,profile_key:State.activeProfile};
    State.weights.push(w);
    if(sb && !State.demo) await sb.from('weights').insert(w);
    saveLocal();toast('Đã ghi');render();
  };
  let wRange=30;
  $$('[data-wrange]').forEach(b=>b.onclick=()=>{wRange=+b.dataset.wrange;drawWeight(wRange)});
  if($('#weightChart')) drawWeight(30);

  // Water
  $$('[data-water]').forEach(b=>b.onclick=async ()=>{
    const ml=+b.dataset.water;
    const w={id:uid(),ml,date:today(),created_at:new Date().toISOString(),user_id:State.user?.id,profile_key:State.activeProfile};
    State.water.push(w);
    if(sb && !State.demo) await sb.from('water').insert(w);
    saveLocal();toast('+'+ml+'ml');render();
  });

  // Reports
  if($('#calChart')) drawReports();

  // Admin — multi-provider
  function togglePwd(sel){const i=$(sel);i.type=i.type==='password'?'text':'password';}
  window.togglePwd=togglePwd;

  function switchProvider(prov){
    CONFIG.AI_PROVIDER=prov;
    ['Groq','Gemini','OpenRouter'].forEach(p=>{
      const s=$('#section'+p); if(s) s.style.display='none';
      const b=$('#prov'+p); if(b){ b.classList.remove('btn','accent'); b.classList.add('secondary'); }
    });
    const sec=$('#section'+prov[0].toUpperCase()+prov.slice(1).replace('router','Router'));
    const btn=$('#prov'+prov[0].toUpperCase()+prov.slice(1).replace('router','Router'));
    if(sec) sec.style.display='';
    if(btn){ btn.classList.remove('secondary'); if(prov==='openrouter') btn.classList.add('accent'); else btn.classList.add('btn'); }
    const label=prov==='gemini'?'⚡ Gemini · '+CONFIG.GEMINI_MODEL:prov==='groq'?'⚡ Groq · '+CONFIG.GROQ_MODEL:'🔀 OpenRouter · '+CONFIG.OPENROUTER_MODEL;
    if($('#provStatus')) $('#provStatus').innerHTML='Đang dùng '+label;
  }
  if($('#provGroq'))       $('#provGroq').onclick=()=>switchProvider('groq');
  if($('#provGemini'))     $('#provGemini').onclick=()=>switchProvider('gemini');
  if($('#provOpenRouter')) $('#provOpenRouter').onclick=()=>switchProvider('openrouter');

  if($('#aSave')) $('#aSave').onclick=async ()=>{
    const msg=$('#aiSaveMsg');
    msg.textContent='⏳ Đang lưu...';
    const cfg={
      provider: CONFIG.AI_PROVIDER,
      gemini_key:   ($('#aGeminiKey')||{}).value||CONFIG.GEMINI_API_KEY,
      gemini_model: ($('#aGeminiModel')||{}).value||CONFIG.GEMINI_MODEL,
      groq_key:     ($('#aGroqKey')||{}).value||CONFIG.GROQ_API_KEY,
      groq_model:   ($('#aGroqModel')||{}).value||CONFIG.GROQ_MODEL,
      openrouter_key:   ($('#aORKey')||{}).value||CONFIG.OPENROUTER_API_KEY,
      openrouter_model: ($('#aORModel')||{}).value||CONFIG.OPENROUTER_MODEL,
    };
    const activeKey = cfg.provider==='gemini'?cfg.gemini_key:cfg.provider==='groq'?cfg.groq_key:cfg.openrouter_key;
    if(!activeKey){ msg.textContent='⚠️ Nhập API key cho provider đang chọn'; return; }
    const ok = await saveAiSettings(cfg);
    msg.textContent = ok ? '✅ Đã lưu vào Supabase!' : '❌ Lỗi — kiểm tra RLS hoặc quyền truy cập.';
    if(ok) toast('AI settings saved');
  };

  if($('#aTest')) $('#aTest').onclick=async ()=>{
    const msg=$('#aiSaveMsg');
    msg.textContent='⏳ Đang test...';
    const prov=CONFIG.AI_PROVIDER;
    const key=prov==='gemini'?($('#aGeminiKey')||{}).value||CONFIG.GEMINI_API_KEY
              :prov==='groq'?($('#aGroqKey')||{}).value||CONFIG.GROQ_API_KEY
              :($('#aORKey')||{}).value||CONFIG.OPENROUTER_API_KEY;
    const model=prov==='gemini'?($('#aGeminiModel')||{}).value||CONFIG.GEMINI_MODEL
               :prov==='groq'?($('#aGroqModel')||{}).value||CONFIG.GROQ_MODEL
               :($('#aORModel')||{}).value||CONFIG.OPENROUTER_MODEL;
    if(!key){ msg.textContent='⚠️ Nhập API key để test'; return; }
    try{
      let r,j;
      if(prov==='gemini'){
        r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:'Reply with only: OK'}]}]})});
        j=await r.json(); msg.textContent=j.candidates?.[0]?'✅ Gemini hoạt động!':'⚠️ '+JSON.stringify(j).slice(0,80);
      } else if(prov==='groq'){
        r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'user',content:'Reply OK'}],max_tokens:5})});
        j=await r.json(); msg.textContent=j.choices?.[0]?'✅ Groq hoạt động!':'⚠️ '+JSON.stringify(j).slice(0,80);
      } else {
        r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'user',content:'Reply OK'}],max_tokens:5})});
        j=await r.json(); msg.textContent=j.choices?.[0]?'✅ OpenRouter hoạt động!':'⚠️ '+JSON.stringify(j).slice(0,80);
      }
    }catch(e){ msg.textContent='❌ Lỗi: '+e.message; }
  };
  if($('#showSql')) $('#showSql').onclick=()=>{$('#sqlOut').textContent=SQL_SCHEMA;$('#sqlOut').classList.toggle('hidden')};
  if($('#copyMigration')) $('#copyMigration').onclick=()=>{
    const sql = "alter table meals add column if not exists items jsonb default '[]'::jsonb;";
    navigator.clipboard.writeText(sql).then(()=>{
      const msg=$('#copyMigrationMsg'); if(msg){msg.style.display='block'; setTimeout(()=>{msg.style.display='none'},4000);}
    }).catch(()=>toast('Copy: ' + sql));
  };

  // Config — Supabase hardcoded, không cần save
}

/* ============================================================
   CHARTS
============================================================ */
function drawWeight(days){
  const arr=State.weights.filter(w=>(w.profile_key||w.profileKey||'husband')===State.activeProfile).slice(-days);
  const ctx=$('#weightChart');if(!ctx) return;
  if(ctx._c) ctx._c.destroy();
  ctx._c=new Chart(ctx,{type:'line',data:{labels:arr.map(w=>w.date.slice(5)),datasets:[{label:'kg',data:arr.map(w=>w.value),borderColor:'#3aab1e',backgroundColor:'#3aab1e22',fill:true,tension:.3}]},options:{plugins:{legend:{display:false}}}});
}
function drawReports(){
  const key=State.activeProfile;
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10))}
  const data=days.map(d=>{const m=State.meals.filter(x=>(x.date||x.created_at||'').slice(0,10)===d && (x.profile_key||x.profileKey||'husband')===key);return {
    c:m.reduce((a,b)=>a+(+b.calories||0),0),
    p:m.reduce((a,b)=>a+(+b.protein||0),0),
    a:m.reduce((a,b)=>a+(+b.carbs||0),0),
    f:m.reduce((a,b)=>a+(+b.fat||0),0)
  }});
  const lab=days.map(d=>d.slice(5));
  new Chart($('#calChart'),{type:'bar',data:{labels:lab,datasets:[{label:'kcal',data:data.map(x=>x.c),backgroundColor:'#3aab1e'}]},options:{plugins:{legend:{display:false}}}});
  new Chart($('#macroChart'),{type:'line',data:{labels:lab,datasets:[
    {label:'P',data:data.map(x=>x.p),borderColor:'#f43f5e',tension:.3},
    {label:'C',data:data.map(x=>x.a),borderColor:'#f59e0b',tension:.3},
    {label:'F',data:data.map(x=>x.f),borderColor:'#8b5cf6',tension:.3}
  ]}});
  const w=State.weights.filter(x=>(x.profile_key||x.profileKey||'husband')===key).slice(-30);
  new Chart($('#wTrend'),{type:'line',data:{labels:w.map(x=>x.date.slice(5)),datasets:[{label:'kg',data:w.map(x=>x.value),borderColor:'#3b82f6',backgroundColor:'#3b82f622',fill:true,tension:.3}]},options:{plugins:{legend:{display:false}}}});
}

async function addMeal(m){
  m.user_id = State.user?.id;
  m.profile_key = State.activeProfile;
  State.meals.unshift(m);
  if(sb && !State.demo){ try{ await sb.from('meals').insert(m); }catch(e){console.warn(e)} }
  saveLocal();
}
async function delMeal(id){
  State.meals = State.meals.filter(x=>x.id!==id);
  if(sb && !State.demo){ try{ await sb.from('meals').delete().eq('id',id); }catch(e){} }
  saveLocal();
}

/* ============================================================
   SQL SCHEMA (for admin display & manual Supabase setup)
============================================================ */
const SQL_SCHEMA = `
-- ================================================
-- PROFILES (mỗi user có 2 rows: _husband và _wife)
-- ================================================
create table if not exists profiles (
  id text primary key,              -- = user_id + '_husband' hoặc '_wife'
  user_id uuid references auth.users on delete cascade,
  profile_key text not null,        -- 'husband' | 'wife'
  name text,
  gender text,
  age int,
  height numeric,
  weight numeric,
  goal_weight numeric,              -- snake_case (không phải "goalWeight")
  activity text,
  goal text,
  role text default 'member',
  created_at timestamptz default now()
);
alter table profiles enable row level security;
-- RLS: user chỉ đọc/ghi profile của chính mình (dựa vào user_id)
create policy "own_profile_rw" on profiles
  for all using (auth.uid() = user_id) with check (auth.uid() = user_id);

-- ================================================
-- MEALS
-- ================================================
create table if not exists meals (
  id text primary key,
  user_id uuid references auth.users on delete cascade,
  profile_key text,                 -- 'husband' | 'wife'
  name text,
  calories numeric,
  protein numeric,
  carbs numeric,
  fat numeric,
  fiber numeric,
  sugar numeric,
  sodium numeric,
  photo text,
  meal_type text,
  date date,
  notes text,
  items jsonb default '[]'::jsonb,
  created_at timestamptz default now()
);
alter table meals enable row level security;
create policy "own_meals" on meals
  for all using (auth.uid() = user_id) with check (auth.uid() = user_id);
-- Migration neu bang da ton tai:
-- alter table meals add column if not exists items jsonb default '[]'::jsonb;

-- ================================================
-- WATER
-- ================================================
create table if not exists water (
  id text primary key,
  user_id uuid references auth.users on delete cascade,
  profile_key text,                 -- 'husband' | 'wife'
  ml int,
  date date,
  created_at timestamptz default now()
);
alter table water enable row level security;
create policy "own_water" on water
  for all using (auth.uid() = user_id) with check (auth.uid() = user_id);

-- ================================================
-- WEIGHTS
-- ================================================
create table if not exists weights (
  id text primary key,
  user_id uuid references auth.users on delete cascade,
  profile_key text,                 -- 'husband' | 'wife'
  value numeric,
  body_fat numeric,
  waist numeric,
  date date,
  created_at timestamptz default now()
);
alter table weights enable row level security;
create policy "own_weights" on weights
  for all using (auth.uid() = user_id) with check (auth.uid() = user_id);

-- ================================================
-- AI SETTINGS
-- ================================================
create table if not exists ai_settings ( key text primary key, value jsonb );
alter table ai_settings enable row level security;
create policy "ai_settings_read" on ai_settings
  for select to authenticated using (true);
create policy "ai_settings_write" on ai_settings
  for all to authenticated using (true) with check (true);

-- ================================================
-- MISC
-- ================================================
create table if not exists nutrition_rules ( key text primary key, value jsonb );
create table if not exists food_database (
  id bigserial primary key, name text, calories numeric, protein numeric,
  carbs numeric, fat numeric
);

-- INDEXES
create index if not exists meals_user_date    on meals(user_id, date);
create index if not exists meals_profile      on meals(user_id, profile_key);
create index if not exists water_user_date    on water(user_id, date);
create index if not exists water_profile      on water(user_id, profile_key);
create index if not exists weights_user_date  on weights(user_id, date);
create index if not exists weights_profile    on weights(user_id, profile_key);
create index if not exists profiles_user      on profiles(user_id);

-- STORAGE BUCKET (tên phải khớp với code: 'food-photos')
insert into storage.buckets (id, name, public)
  values ('food-photos', 'food-photos', true)
  on conflict do nothing;

-- Storage RLS
create policy "food_photos_upload" on storage.objects

create policy "food_photos_read" on storage.objects

`;

<!-- ============ TÍCH HỢP CHỌN THÀNH PHẦN TỪ BẢNG foods ============ -->
<style>
  .food-ac-menu{position:absolute;z-index:9999;background:var(--card,#fff);border:1px solid var(--border,#d8e8d8);
    border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);max-height:240px;overflow:auto;min-width:220px;display:none;font-family:inherit}
  .food-ac-menu.open{display:block}
  .food-ac-item{padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;font-size:13px;color:var(--text,#0d1117)}
  .food-ac-item:hover,.food-ac-item.active{background:rgba(58,171,30,.12)}
  .food-ac-item small{color:var(--muted,#8b95a8);font-size:11px;white-space:nowrap}
  .food-ac-empty{padding:12px;color:var(--muted,#8b95a8);font-size:13px;text-align:center}
</style>
<script>
/* Autocomplete chọn thành phần từ public.foods cho cả 2 form:
   - Modal sửa  : .ii-name / .ii-unit / .ii-cal / .ii-p / .ii-c / .ii-f
   - Nhập thủ công: .mi-name / .mi-unit / .mi-cal / .mi-p / .mi-c / .mi-f
*/
(function(){
  var FOODS = [], loaded = false, loading = null;
  function waitForSb(timeout){
    return new Promise(function(resolve){
      if(window.sb) return resolve(window.sb);
      var elapsed = 0, interval = 100;
      var t = setInterval(function(){
        elapsed += interval;
        if(window.sb){ clearInterval(t); resolve(window.sb); }
        else if(elapsed >= (timeout||10000)){ clearInterval(t); resolve(null); }
      }, interval);
    });
  }
  function loadFoods(){
    if(loaded) return Promise.resolve(FOODS);
    if(loading) return loading;
    loading = waitForSb(10000).then(function(sbClient){
      if(!sbClient){ console.warn('[foods] Supabase chưa khởi tạo sau 10s'); loading=null; return []; }
      return sbClient.from('foods')
        .select('id,name,unit,kcal_per_unit,protein_g,carbs_g,fat_g')
        .order('name',{ascending:true}).limit(1000)
        .then(function(res){
          if(res.error){ console.error('[foods]',res.error); loading=null; return []; }
          FOODS = res.data||[]; loaded = true;
          console.log('[foods] loaded', FOODS.length, 'items');
          return FOODS;
        });
    });
    return loading;
  }

  var SCHEMAS = [
    { name:'.ii-name', row:'tr', map:{ unit:'.ii-unit', cal:'.ii-cal', p:'.ii-p', c:'.ii-c', f:'.ii-f' } },
    { name:'.mi-name', row:'tr', map:{ unit:'.mi-unit', cal:'.mi-cal', p:'.mi-p', c:'.mi-c', f:'.mi-f' } }
  ];
  function findSchema(input){ for(var i=0;i<SCHEMAS.length;i++){ if(input.matches(SCHEMAS[i].name)) return SCHEMAS[i]; } return null; }

  var menu = document.createElement('div');
  menu.className = 'food-ac-menu';
  document.body.appendChild(menu);
  var currentInput = null;

  function positionMenu(input){
    var r = input.getBoundingClientRect();
    menu.style.left  = (window.scrollX + r.left) + 'px';
    menu.style.top   = (window.scrollY + r.bottom + 4) + 'px';
    menu.style.width = Math.max(r.width, 220) + 'px';
  }
  function closeMenu(){ menu.classList.remove('open'); currentInput=null; }
  function escapeHtml(s){return (s==null?'':String(s)).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

  function renderMenu(q){
    var term = (q||'').trim().toLowerCase();
    var list = !term ? FOODS.slice(0,30)
      : FOODS.filter(function(f){return f.name.toLowerCase().indexOf(term)>=0;}).slice(0,30);
    if(!list.length){ menu.innerHTML = '<div class="food-ac-empty">Không tìm thấy món</div>'; }
    else {
      menu.innerHTML = list.map(function(f){
        return '<div class="food-ac-item" data-id="'+f.id+'">'+
          '<span>'+escapeHtml(f.name)+'</span>'+
          '<small>'+(+f.kcal_per_unit||0)+' kcal / '+escapeHtml(f.unit||'')+'</small>'+
          '</div>';
      }).join('');
    }
    menu.classList.add('open');
  }

  function fillRow(input, food){
    var schema = findSchema(input); if(!schema) return;
    var row = input.closest(schema.row); if(!row) return;
    function set(sel, val){
      var el = row.querySelector(sel); if(!el) return;
      el.value = (val==null?'':val);
      el.dispatchEvent(new Event('input',{bubbles:true}));
      el.dispatchEvent(new Event('change',{bubbles:true}));
    }
    input.value = food.name;
    set(schema.map.unit, food.unit);
    set(schema.map.cal,  food.kcal_per_unit);
    set(schema.map.p,    food.protein_g);
    set(schema.map.c,    food.carbs_g);
    set(schema.map.f,    food.fat_g);
    input.dispatchEvent(new Event('input',{bubbles:true}));
    input.dispatchEvent(new Event('change',{bubbles:true}));
    closeMenu();
  }

  document.addEventListener('focusin', function(e){
    var inp = e.target;
    if(!(inp instanceof HTMLInputElement)) return;
    if(!findSchema(inp)) return;
    currentInput = inp;
    var show = function(){ positionMenu(inp); renderMenu(inp.value); };
    if(!loaded){ loadFoods().then(function(){ if(currentInput===inp) show(); }); }
    else show();
  });
  document.addEventListener('input', function(e){
    var inp = e.target;
    if(!(inp instanceof HTMLInputElement)) return;
    if(!findSchema(inp)) return;
    currentInput = inp; positionMenu(inp); renderMenu(inp.value);
  });
  document.addEventListener('focusout', function(){
    setTimeout(function(){ if(!menu.matches(':hover')) closeMenu(); }, 150);
  });
  window.addEventListener('scroll', function(){ if(currentInput) positionMenu(currentInput); }, true);
  window.addEventListener('resize', function(){ if(currentInput) positionMenu(currentInput); });

  menu.addEventListener('mousedown', function(e){
    var it = e.target.closest('.food-ac-item'); if(!it || !currentInput) return;
    e.preventDefault();
    var food = FOODS.find(function(x){ return x.id === it.dataset.id; });
    if(food) fillRow(currentInput, food);
  });

  function tryPreload(){ if(window.sb){ loadFoods(); return true; } return false; }
  if(!tryPreload()){
    var t = setInterval(function(){ if(tryPreload()) clearInterval(t); }, 500);
    setTimeout(function(){ clearInterval(t); }, 15000);
  }
})();
</script>
